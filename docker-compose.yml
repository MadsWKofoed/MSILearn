services:
  app:
    platform: ${APP_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SHINY_PORT: ${SHINY_PORT:-3838}
      MONGO_DB: ${MONGO_DB:-MSI_DB}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      APP_WORKERS: ${APP_WORKERS:-}
      APP_WORKER_MAX: ${APP_WORKER_MAX:-8}
      APP_WORKER_RESERVE_CORES: ${APP_WORKER_RESERVE_CORES:-1}
      APP_WORKER_CPU_FRACTION: ${APP_WORKER_CPU_FRACTION:-0.75}
      APP_MEMORY_PER_WORKER_GB: ${APP_MEMORY_PER_WORKER_GB:-2}
      APP_RESERVE_MEMORY_GB: ${APP_RESERVE_MEMORY_GB:-2}
      APP_BIOCPARALLEL_BACKEND: ${APP_BIOCPARALLEL_BACKEND:-snow}
    ports:
      - "${APP_PORT:-3838}:3838"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:${MONGO_VERSION:-8.2.7}
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
